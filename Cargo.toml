[package]
name = "archinstall-zfs-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
alpm = "5.0.2"
blockdev = "0.3.1"
clap = { version = "4.6.0", features = ["derive"] }
color-eyre = "0.6.5"
crossterm = "0.29.0"
nix = { version = "0.31.2", features = ["fs", "process", "signal"] }
pacmanconf = "3.1.0"
ratatui = "0.30.0"
ratatui-macros = "0.7.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sysinfo = "0.38.4"
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-appender = "0.2.4"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
tui-scrollview = "0.6.3"
tui-textarea = "0.7.0"
tui-widget-list = "0.15.2"

[dev-dependencies]
tempfile = "3.27.0"
