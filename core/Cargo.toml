[package]
name = "archinstall-zfs-core"
version = "0.1.0"
edition = "2024"

[dependencies]
alpm = "5.0.2"
blockdev = "0.3.1"
color-eyre = "0.6.5"
fs_extra = "1.3.0"
minijinja = { version = "2.19.0", features = ["builtins"] }
nix = { version = "0.31.2", features = ["fs", "process", "signal"] }
pacmanconf = "3.1.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml_ng = "0.10.0"
sysinfo = "0.38.4"
thiserror = "2.0.18"
tracing = "0.1.44"

[dev-dependencies]
tempfile = "3.27.0"
