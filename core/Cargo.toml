[package]
name = "archinstall-zfs-core"
version = "0.1.0"
edition = "2024"

[dependencies]
alpm = "5.0.2"
alpm-utils = "5"
aur-depends = { version = "5.0.0", default-features = false }
aur-fetch = "0.11.3"
blockdev = "0.3.1"
color-eyre = "0.6.5"
fs_extra = "1.3.0"
minijinja = { version = "2.19.0", features = ["builtins"] }
nix = { version = "0.31.2", features = ["fs", "mount", "process", "signal"] }
pacmanconf = "3.1.0"
raur = { version = "7", default-features = false, features = ["blocking", "reqwest", "blocking-trait"] }
regex = "1.12.3"
reqwest = { version = "0.11", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml_ng = "0.10.0"
sysinfo = "0.38.4"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["rt"] }
tracing = "0.1.44"

[dev-dependencies]
tempfile = "3.27.0"
