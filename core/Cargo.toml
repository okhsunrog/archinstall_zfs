[package]
name = "archinstall-zfs-core"
version = "0.1.0"
edition = "2024"

[dependencies]
alpm = "5.0.2"
alpm-utils = "5"
aur-depends = { version = "5.0.0", default-features = false }
aur-fetch = "0.11.3"
blockdev = "0.3.1"
color-eyre = "0.6.5"
fs_extra = "1.3.0"
futures = "0.3.32"
hex = "0.4.3"
lzma-rs = "0.3.0"
minijinja = { version = "2.19.0", features = ["builtins"] }
nix = { version = "0.31.2", features = ["fs", "mount", "process", "signal"] }
pacmanconf = "3.1.0"
raur = { version = "7", default-features = false, features = ["async", "reqwest"] }
regex = "1.12.3"
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml_ng = "0.10.0"
sha2 = "0.11.0"
sysinfo = "0.38.4"
tar = "0.4.45"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["rt", "rt-multi-thread", "macros", "io-util", "fs", "sync", "time"] }
tokio-util = { version = "0.7.18", features = ["rt"] }
tracing = "0.1.44"

[dev-dependencies]
tempfile = "3.27.0"
