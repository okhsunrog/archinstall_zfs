name: Check

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v7

    - name: Cache cargo
      uses: actions/cache@v6
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-check-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-check-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run clippy
      run: cargo clippy --workspace --all-targets --locked -- -D warnings

    - name: Run tests
      run: cargo test --workspace --locked

    - name: Check desktop mock UI
      run: cargo check -p archinstall-zfs-slint --no-default-features --features desktop-mock --locked

    - name: Check NetworkManager backend
      run: cargo clippy -p archinstall-zfs-core --no-default-features --features wifi-nm --all-targets --locked -- -D warnings

    - name: Install cargo-audit when missing from the builder image
      run: command -v cargo-audit || cargo install cargo-audit --version 0.22.2 --locked

    - name: Audit dependencies
      run: cargo audit
