name: Build ISO and Prepare ZFS

on:
  # Trigger on releases
  release:
    types: [published]

  # Run prepare job on every push to surface regressions quickly
  push:
    branches:
      - '**'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to build (main_profile or testing_profile)'
        required: true
        default: 'main_profile'
        type: choice
        options:
          - main_profile
          - testing_profile
      upload_artifact:
        description: 'Upload ISO as artifact'
        required: false
        default: true
        type: boolean

jobs:
  # Minimal, fast inner-loop job to exercise only the ZFS package preparation.
  prepare-zfs-packages:
    name: Prepare ZFS packages
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: archlinux:latest
      options: --privileged --cpus=1 --memory=8g
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (prepare-only)
        run: |
          set -euxo pipefail
          pacman -Syu --noconfirm
          # Core build and tooling set for makepkg/AUR
          pacman -S --noconfirm git just rsync python base-devel fakeroot binutils gcc make cmake pkgconf curl
          # For pacman keyring and signature checks
          pacman -S --noconfirm archlinux-keyring gnupg
          pacman-key --init
          pacman-key --populate archlinux
          # Create unprivileged builder (makepkg must not run as root)
          useradd -m builder || true
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: Run prepare step with verbose logging
        env:
          # Enable extra verbosity in our script if supported
          ZFS_BUILDER_DEBUG: "1"
        run: |
          set -euxo pipefail
          sudo -u builder -E just prepare-zfs-packages

      - name: Collect makepkg/build logs
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          # Common locations for AUR build logs
          find . -maxdepth 5 -type f -name "makepkg*.log" -print -exec cp -v {} artifacts/ \; || true
          find . -maxdepth 6 -type f -name "*.log" -path "*/zfs*" -print -exec cp -v {} artifacts/ \; || true
          # Optional: capture our script-specific logs if any
          if [ -d gen_iso/logs ]; then cp -vr gen_iso/logs artifacts/ || true; fi
          # Capture environment summaries for diagnostics
          echo "== pacman -Q ==" > artifacts/env.txt
          pacman -Q >> artifacts/env.txt || true
          {
            echo; echo "== uname -a =="; uname -a
            echo; echo "== id =="; id
            echo; echo "== env =="; env | sort
          } >> artifacts/env.txt

      - name: Upload prepare artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prepare-zfs-artifacts
          path: artifacts
          retention-days: 7

  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: archlinux:latest
      options: --privileged --cpus=1 --memory=8g  # Single core, 8GB RAM; still privileged for archiso

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        pacman -Syu --noconfirm
        # Install toolchain required by makepkg and AUR builds
        pacman -S --noconfirm archiso git just rsync python base-devel fakeroot binutils gcc make cmake pkgconf archlinux-keyring gnupg
        # Initialize keyring for signed sources and pacman sync
        pacman-key --init
        pacman-key --populate archlinux
        # Ensure non-root makepkg works by creating a build user (recommended practice on Arch)
        useradd -m builder || true
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chown -R builder:builder .

    - name: Set profile for build
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          echo "PROFILE=main_profile" >> $GITHUB_ENV
        else
          echo "PROFILE=${{ github.event.inputs.profile || 'main_profile' }}" >> $GITHUB_ENV
        fi

    - name: Build ISO
      run: |
        # Run builds as an unprivileged user so that makepkg can create packages
        if [ "$PROFILE" = "main_profile" ]; then
          sudo -u builder -E just build-main-iso
        else
          sudo -u builder -E just build-testing-iso
        fi

    - name: Find and list built ISOs
      run: |
        echo "Built ISOs:"
        ls -la gen_iso/out/
        
        # Find the ISO file (should be only one after build)
        ISO_FILE=$(find gen_iso/out/ -name "*.iso" | head -1)
        if [ -z "$ISO_FILE" ]; then
          echo "Error: No ISO file found!"
          exit 1
        fi
        
        echo "ISO_FILE=$ISO_FILE" >> $GITHUB_ENV
        echo "ISO_BASENAME=$(basename $ISO_FILE)" >> $GITHUB_ENV
        echo "Found ISO: $ISO_FILE ($(du -h $ISO_FILE | cut -f1))"

    - name: Upload ISO as artifact
      if: github.event.inputs.upload_artifact != 'false'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ISO_BASENAME }}
        path: ${{ env.ISO_FILE }}
        retention-days: 30

    - name: Generate checksums for release
      if: github.event_name == 'release'
      run: |
        cd gen_iso/out
        sha256sum *.iso > checksums.sha256
        cat checksums.sha256

    - name: Upload ISO to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ${{ env.ISO_FILE }}
        asset_name: ${{ env.ISO_BASENAME }}
        asset_content_type: application/octet-stream

    - name: Upload checksums to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: gen_iso/out/checksums.sha256
        asset_name: checksums.sha256
        asset_content_type: text/plain