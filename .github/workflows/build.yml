name: Build

on:
  push:
  pull_request:

  # Monthly automated builds (4th of each month at 4:30 AM UTC)
  schedule:
    - cron: '30 4 4 * *'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      build_iso:
        description: 'Build ISO images'
        required: false
        default: false
        type: boolean
      create_release:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v7

    - name: Cache cargo
      uses: actions/cache@v6
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cargo-build-${{ hashFiles('Cargo.lock') }}
        restore-keys: cargo-build-

    - name: Build release binaries
      run: cargo build --release --workspace --locked

    - name: Upload binaries
      uses: actions/upload-artifact@v7
      with:
        name: binaries
        path: |
          target/release/azfs-tui
          target/release/azfs
          target/release/xtask

  iso-linux:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_iso == 'true' || github.event.inputs.create_release == 'true'))
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged

    steps:
    - uses: actions/checkout@v7

    - name: Download binaries
      uses: actions/download-artifact@v8
      with:
        name: binaries
        path: target/release/

    - name: Fix binary permissions
      run: chmod +x target/release/azfs-tui target/release/azfs target/release/xtask

    - name: Build ISO with linux kernel
      run: |
        target/release/xtask render-profile \
          --profile-dir gen_iso/profile --out-dir gen_iso/profile_rendered \
          --kernel linux --zfs precompiled
        just _prepare-binary
        if ! sudo mkarchiso -v -w "gen_iso/workdir" -o gen_iso/out gen_iso/profile_rendered; then
          echo "Precompiled failed, retrying with DKMS..."
          rm -rf gen_iso/profile_rendered gen_iso/workdir
          target/release/xtask render-profile \
            --profile-dir gen_iso/profile --out-dir gen_iso/profile_rendered \
            --kernel linux --zfs dkms
          just _prepare-binary
          sudo mkarchiso -v -w "gen_iso/workdir" -o gen_iso/out gen_iso/profile_rendered
        fi

    - name: Upload ISO
      uses: actions/upload-artifact@v7
      with:
        name: iso-linux
        path: gen_iso/out/*.iso
        if-no-files-found: error

  iso-linux-lts:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_iso == 'true' || github.event.inputs.create_release == 'true'))
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged

    steps:
    - uses: actions/checkout@v7

    - name: Download binaries
      uses: actions/download-artifact@v8
      with:
        name: binaries
        path: target/release/

    - name: Fix binary permissions
      run: chmod +x target/release/azfs-tui target/release/azfs target/release/xtask

    - name: Build ISO with linux-lts kernel
      run: |
        target/release/xtask render-profile \
          --profile-dir gen_iso/profile --out-dir gen_iso/profile_rendered \
          --kernel linux-lts --zfs precompiled
        just _prepare-binary
        if ! sudo mkarchiso -v -w "gen_iso/workdir" -o gen_iso/out gen_iso/profile_rendered; then
          echo "Precompiled failed, retrying with DKMS..."
          rm -rf gen_iso/profile_rendered gen_iso/workdir
          target/release/xtask render-profile \
            --profile-dir gen_iso/profile --out-dir gen_iso/profile_rendered \
            --kernel linux-lts --zfs dkms
          just _prepare-binary
          sudo mkarchiso -v -w "gen_iso/workdir" -o gen_iso/out gen_iso/profile_rendered
        fi

    - name: Upload ISO
      uses: actions/upload-artifact@v7
      with:
        name: iso-linux-lts
        path: gen_iso/out/*.iso

  release:
    needs: [build, iso-linux, iso-linux-lts]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
    - name: Download binaries
      uses: actions/download-artifact@v8
      with:
        name: binaries
        path: binaries/

    - name: Download linux ISO
      uses: actions/download-artifact@v8
      with:
        name: iso-linux
        path: isos/
    - name: Download linux-lts ISO
      uses: actions/download-artifact@v8
      with:
        name: iso-linux-lts
        path: isos/

    - name: Generate checksums
      run: |
        cd isos
        for f in *.iso; do
          [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
        done

    - name: Set release info
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        case "$EVENT_NAME" in
          schedule)
            release_date=$(date +'%Y.%m.%d')
            {
              printf 'TAG_NAME=%s\n' "$release_date"
              printf 'RELEASE_NAME=Monthly Release - %s\n' "$release_date"
              printf 'BODY=%s\n' 'Automated build with latest packages and ZFS modules.'
            } >> "$GITHUB_ENV"
            ;;
          workflow_dispatch)
            release_date=$(date +'%Y%m%d-%H%M%S')
            {
              printf 'TAG_NAME=manual-%s\n' "$release_date"
              printf 'RELEASE_NAME=Manual Release - %s\n' "$release_date"
              printf 'BODY=%s\n' 'Manual build.'
            } >> "$GITHUB_ENV"
            ;;
          *)
            {
              printf 'TAG_NAME=%s\n' "$REF_NAME"
              printf 'RELEASE_NAME=Release %s\n' "$REF_NAME"
            } >> "$GITHUB_ENV"
            ;;
        esac

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.RELEASE_NAME }}
        body: ${{ env.BODY || '' }}
        generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
        draft: false
        files: |
          binaries/*
          isos/*.iso
          isos/*.sha256
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
